# Bos display server config

[general]
outer_gap = 8
inner_gap = 8
border_size = 2
inactive_opacity = 80
inactive_opacity_floating = 100

[colors]
border_focused   = #8aadf4
border_unfocused = #363a4f
bg_top           = #1e3a5f
bg_bottom        = #0a0a0f

[window_rules]
hello_egui = float
launcher = float
# bouncing_cube_1 = tile

[protected_windows]
launcher

[shortcuts]
close_window     = super+q
focus_next       = alt+tab
focus_prev       = alt+shift+tab
focus_left       = super+left
focus_right      = super+right
focus_up         = super+up
focus_down       = super+down
toggle_launcher  = super+space
